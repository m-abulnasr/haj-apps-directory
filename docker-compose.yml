services:
  # ─────────────────────────────────────────────────────────────────────────────
  # DATABASE  (PostgreSQL + pgvector extension)
  # ─────────────────────────────────────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg15
    restart: unless-stopped
    environment:
      POSTGRES_DB: quran_apps_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d quran_apps_db"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ─────────────────────────────────────────────────────────────────────────────
  # BACKEND  (Django + Django REST Framework)
  # ─────────────────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    # Run migrations then start the dev server
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    environment:
      DEBUG: "True"
      DJANGO_SETTINGS_MODULE: config.settings.development
      # Database
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: quran_apps_db
      DB_USER: postgres
      DB_PASSWORD: postgres123
      DB_HOST: db
      DB_PORT: "5432"
      USE_SQLITE: "False"
      # Security
      SECRET_KEY: "django-insecure-dev-key-change-in-production"
      ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0,backend"
      # CORS – allow requests from the Angular dev server
      CORS_ALLOWED_ORIGINS: "http://localhost:4200,http://frontend:4200"
      CORS_ALLOW_CREDENTIALS: "True"
      # Frontend origin for WebAuthn / allauth headless
      FRONTEND_BASE_URL: "http://localhost:4200"
      WEBAUTHN_RP_ID: "localhost"
      # Logging
      PYTHONIOENCODING: "utf-8"
      LOG_LEVEL: "INFO"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─────────────────────────────────────────────────────────────────────────────
  # FRONTEND  (Angular 20 dev server)
  # ─────────────────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: development
    restart: unless-stopped
    environment:
      # Enable file-change polling for bind mounts on Windows / WSL2
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "1000"
    ports:
      - "4200:4200"
    volumes:
      # Bind-mount source so edits are reflected without rebuilding
      - .:/app
      # Keep the container's node_modules isolated from the host
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  frontend_node_modules:
