    <!-- Stale deploy recovery: if cached HTML references JS files that no longer exist,

            errors++;
            if (errors >= 3 && !loaded && !sessionStorage.getItem('sw_recovery')) {
              sessionStorage.setItem('sw_recovery', '1');
              if ('caches' in window) {
